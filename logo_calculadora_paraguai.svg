<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo calculadora Paraguai</title>
  <desc>Ícone de calculadora com as cores da bandeira do Paraguai: vermelho, branco e azul</desc>

  <style>
    .var1 { fill: #D52B1E; }
    .var2 { fill: #FFFFFF; }
    .var3 { fill: #0038A8; }
    .shadow { fill: rgba(0,0,0,0.10); }
  </style>

  <g transform="translate(190, 30)">
    <rect x="0" y="0" width="300" height="420" rx="36" fill="#0038A8"/>
    <rect x="0" y="0" width="300" height="140" rx="36" fill="#D52B1E"/>
    <rect x="0" y="104" width="300" height="36" fill="#D52B1E"/>
    <rect x="0" y="140" width="300" height="140" fill="#FFFFFF"/>

    <rect x="20" y="18" width="260" height="90" rx="14" fill="rgba(0,0,0,0.18)"/>
    <rect x="24" y="22" width="252" height="82" rx="11" fill="#FFFFFF" opacity="0.95"/>

    <text x="270" y="88" text-anchor="end" font-family="monospace" font-size="52" font-weight="700" fill="#D52B1E">500</text>
    <text x="36" y="88" text-anchor="start" font-family="monospace" font-size="22" font-weight="500" fill="#0038A8">US$</text>

    <rect x="22" y="156" width="58" height="46" rx="10" fill="#D52B1E"/>
    <rect x="92" y="156" width="58" height="46" rx="10" fill="#D52B1E"/>
    <rect x="162" y="156" width="58" height="46" rx="10" fill="#D52B1E"/>
    <rect x="232" y="156" width="58" height="46" rx="10" fill="#0038A8"/>

    <text x="51" y="187" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">%</text>
    <text x="121" y="187" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">÷</text>
    <text x="191" y="187" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">×</text>
    <text x="261" y="187" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">−</text>

    <rect x="22" y="216" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="92" y="216" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="162" y="216" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="232" y="216" width="58" height="46" rx="10" fill="#D52B1E"/>

    <text x="51" y="247" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">7</text>
    <text x="121" y="247" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">8</text>
    <text x="191" y="247" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">9</text>
    <text x="261" y="247" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">+</text>

    <rect x="22" y="276" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="92" y="276" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="162" y="276" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>

    <text x="51" y="307" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">4</text>
    <text x="121" y="307" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">5</text>
    <text x="191" y="307" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">6</text>

    <rect x="22" y="336" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="92" y="336" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="162" y="336" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>

    <text x="51" y="367" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">1</text>
    <text x="121" y="367" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">2</text>
    <text x="191" y="367" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">3</text>

    <rect x="22" y="396" width="128" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="162" y="396" width="58" height="46" rx="10" fill="#FFFFFF" stroke="#0038A8" stroke-width="2"/>
    <rect x="232" y="276" width="58" height="166" rx="10" fill="#D52B1E"/>

    <text x="86" y="427" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0038A8">0</text>
    <text x="191" y="427" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#0038A8">.</text>
    <text x="261" y="367" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">=</text>
  </g>

  <text x="340" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">512 × 512 — para favicon e compartilhamento</text>
</svg>
